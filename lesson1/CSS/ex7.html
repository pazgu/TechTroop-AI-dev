<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Titles</title>
</head>
<body style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1000'); background-size: cover;">
    <h1 style="opacity: 0.4; color: black; background-color: white; padding: 15px; display: inline-block; margin-bottom: 40px;">
        Transparent Title 
    </h1>
    <br> <h1 style="background-color: #ffffff; color: #000000; padding: 15px; display: inline-block; opacity: 1;">
        Solid Title 
    </h1>

</body>
</html>
