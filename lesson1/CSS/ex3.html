<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Important Websites</title>
    </head>
    <body style="text-align:center">
        <h1 style="color: black; border-bottom: 2px solid black; padding-bottom: 10px;">Important Websites</h1>
        <div style="max-width: 400px; display:inline-block;">
            <div style="border: 2px solid #000000; margin-bottom: 15px; background-color: #f0f0f0;">
                <a href="https://www.ynet.co.il" target="_blank">
                    <img src="ynet.jpeg" alt="News">
                </a>
            </div>
            <div style="border: 2px solid #000000; margin-bottom: 15px; background-color: #f0f0f0;">
                <a href="https://www.youtube.com" target="_blank">
                    <img src="youtube.png" alt="YouTube">
                </a>
            </div>   
            <div style="border: 2px solid #000000; margin-bottom: 15px; background-color: #f0f0f0;">
                <a href="https://www.facebook.com" target="_blank">
                    <img src="facebook.png" alt="Facebook">
                </a>
            </div>
        </div>
    </body>
</html>
