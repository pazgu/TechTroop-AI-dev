<!DOCTYPE html>

<head>

        }

        h1 {
            color: #1e3a8a; 
            margin-bottom: 20px;
            font-size: 32px;
        }

        table {
            border-collapse: collapse;
            background-color: #ffffff;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        th:nth-child(2), td:nth-child(2) {
            text-align: left;
        }

        th {
            background-color: #1e3a8a;
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 16px;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tr:first-child td {
            font-weight: bold;
        }
    </style>
</head>
