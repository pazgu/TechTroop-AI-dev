<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="#" method="POST">
        <fieldset>
            <legend>Personal Details</legend>
            <div>
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="fullName" placeholder="Paz Gueta" required>
            </div>
            <div>
                <label for="email-address">Email Address:</label>
                <input type="email" id="email-address" name="email" placeholder="example@email.com" required>
            </div>
                <label for="phone-number">Phone Number:</label>
                <input type="tel" id="phone-number" name="phone" placeholder="+972-123-456-7890">
            </div>
        </fieldset>
        <fieldset>
            <legend>Inquiry Details</legend>
            <div>
                <label for="subject">Topic of Inquiry:</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Select a topic...</option>
                    <option value="general">General Question</option>
                    <option value="support">Technical Support</option>
                    <option value="billing">Billing Inquiry</option>
                    <option value="partnership">Business Partnership</option>
                </select>
            </div>
            <div>
                <label>Preferred Contact Method:</label>
                <input type="radio" id="pref-email" name="contactMethod" value="email" checked>
                <label for="pref-email">Email</label>
                <input type="radio" id="pref-phone" name="contactMethod" value="phone">
                <label for="pref-phone">Phone Call</label>
            </div>
            <div>
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
            </div>
        </fieldset>
        <fieldset>
            <legend>Preferences</legend>
            <div>
                <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
                <label for="newsletter">Subscribe to our monthly newsletter</label>
            </div>
            <div>
                <input type="checkbox" id="terms" name="terms" value="agree" required>
                <label for="terms">I agree to the privacy policy and terms of service</label>
            </div>
        </fieldset>
        <div>
            <button type="submit">Submit Form</button>
            <button type="reset">Reset Fields</button>
        </div>
    </form>
</body>
</html>
