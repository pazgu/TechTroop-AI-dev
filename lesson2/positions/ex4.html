<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .red-background {
           position: relative;
           width: 300px;
           height: 200px;
           margin: auto;
           background-color: red;
           border-radius: 6px;
        }

        .silver-edges {
            position: absolute;
            background-color: silver;
            height: 70px;
            width: 70px;
            border-radius: 5px;
        }

        #edge-1 {
          top: 0;
          left: 0;  
        }

        #edge-2 {
          top: 0;
          right: 0;
        }

        .white-space {
          position: absolute;
          background-color: white;
          height: 130px;
          width: calc(100% - 140px);
          top:0;
          left: 70px;
          /* border-radius: 5px; */
        }
    </style>
</head>
<body>
    <div class="red-background">
        <div class="silver-edges" id="edge-1"></div>
        <div class="silver-edges" id="edge-2"></div>
        <div class="white-space"></div>
    </div>
</body>
</html>
