<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .background {
            position: relative;
            width: 350px;
            height: 200px;
            background-color: blueviolet;
            margin: auto;
            margin-top: 30px;
        }

        .text {
            position: absolute;
            color: #000000;
            font-weight: bold;
            padding: 5px; 
        }

        #money {
            top: 0;
            left: 0;
        }

        #time {
            bottom: 0;
            right: 0;
        }

        .bar {
           background-color: grey;
           position: absolute;
           bottom: 5px;
           width: 30px;
        }

        #bar-1 {
          height: 20px;
          left: 5px;
        }

        #bar-2 {
          height: 60px;
          left: 50px;
        }

        #bar-3 {
          height: 100px;
          left: 95px;
        }

        #bar-4 {
          height: 80px;
          left: 140px;  
        }

        #bar-5 {
          height: 66px;
          left: 185px;
        }

        #bar-6 {
          height: 40px;
          left: 230px;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="text" id="money">Money</div>
        <div class="text" id="time">Time</div>
        <div class="bar" id="bar-1"></div>
        <div class="bar" id="bar-2"></div>
        <div class="bar" id="bar-3"></div>
        <div class="bar" id="bar-4"></div>
        <div class="bar" id="bar-5"></div>
        <div class="bar" id="bar-6"></div>
    </div>
</body>
</html>
