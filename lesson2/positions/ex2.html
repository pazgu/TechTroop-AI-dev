<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: blue;
        }

        .child {
            position: absolute;
            width: 300px;
            height: 10px;
            background-color: red;
        }

        #child-1 {
            top: 40px;
            left: 0;
           
        }

        #child-2 {
            top: 0;
            left: 40px;
            height: 100%;
            width: 10px;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div class="child" id="child-1"></div>
        <div class="child" id="child-2"></div>
    </div>
</body>
</html>
