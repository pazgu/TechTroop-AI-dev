<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texts on Image Task</title>
    <style>
        .image-container {
            position: relative;
            margin: auto; 
            width: 40%;
            max-width: 450px; 
            min-width: 200px;
        }

        img {
            display: block;
            width: 100%;   
            height: auto;  
            border: 1px solid #000;
        }

        .corner-text {
            position: absolute;
            color: #000000;
            font-weight: bold;
            padding: 5px; 
        }

        .top-left {
            top: 0;
            left: 0;
        }

        .top-right {
            top: 0;
            right: 0;
        }

        .bottom-left {
            bottom: 0;
            left: 0;
        }

        .bottom-right {
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <div class="corner-text top-left">Top-Left</div>
        <div class="corner-text top-right">Top-Right</div>
        <div class="corner-text bottom-left">Bottom-Left</div>
        <div class="corner-text bottom-right">Bottom-Right</div>
        <img src="/lesson1/CSS/facebook.png" alt="Responsive Cat">
    </div>
</body>
</html>
