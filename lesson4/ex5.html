<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Card component</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #5c5cd6; 
            font-family: Segoe UI;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .product-card {
            background-color: white;
            width: 100%;
            max-width: 360px; 
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column; 
        }

        .card-image {
            background: linear-gradient(135deg, #4f46e5, #a855f7); /* גרדיאנט סגול-כחול יפה */
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-circle {
            background-color: rgba(255, 255, 255, 0.2);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-circle svg {
            width: 26px;
            height: 26px;
            fill: #ffffff;
            opacity: 0.8;
        }

        .card-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;   
        }

        .product-title {
            margin: 0 0 12px 0;
            color: #1e293b;
            font-size: 22px;
            font-weight: 700;
        }

        .product-description {
            margin: 0 0 24px 0;
            color: #64748b;
            font-size: 13px;
            line-height: 1.6;
        }

        .cta-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #ef4444; 
        }

        .btn-add-cart {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-add-cart:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        @media (min-width: 600px) and (max-width: 899px) {
            .product-card {
                max-width: 480px; 
            }

            .product-title {
                font-size: 24px; 
            }

            .product-description {
                font-size: 14px;
            }

            .cta-group {
                flex-direction: row;
                justify-content: space-between; /* דוחף מחיר לשמאל וכפתור לימין */
                align-items: center;
            }

            .btn-add-cart {
                width: auto; 
                padding: 10px 20px;
            }
        }

        @media (min-width: 900px) {
            .product-card {
                max-width: 800px; 
                flex-direction: row; 
            }

            .card-image-area {
                flex: 1;
                height: auto;
                min-height: 320px;
            }

            .card-content {
                flex: 1.2; 
                padding: 40px;
                justify-content: center; 
            }
        }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="card-image">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3a3 3 0 0 1-3 3a3 3 0 0 1-3-3a3 3 0 0 1 3-3Z"/>
                </svg>
            </div>
        </div>
        <div class="card-content">
            <h2 class="product-title">Premium Laptop</h2>
            <p class="product-description">
                High-performance laptop perfect for developers and designers. Features the latest processor, ample RAM, and a stunning display that brings your work to life.
            </p>
            <div class="cta-group">
                <span class="product-price">$1,299</span>
                <button class="btn-add-cart">Add to Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
