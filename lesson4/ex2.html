<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        h1 {
            font-size: 24px;  
        }

        p{
            font-size: 14px;
        }

        @media (min-width: 600px) and (max-width: 900px) {
            h1 {
                font-size: 36px;            
            }

            p {
                font-size: 16px;
            }
        }

        @media (min-width: 901px) {
            h1 {
                font-size: 48px;            
            }

            p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <h1>Hi</h1>
    <p>My name is Paz</p>  
</body>
</html>
