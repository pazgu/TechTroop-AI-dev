<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            width: 80%;
            margin: auto;
            border: 1px solid lightgray;
            height: 300px;
        }  

        .circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgb(46, 148, 179);
        }

        .container > div {
            flex: 1;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container > div:first-child {
            border-right: 1px solid lightgray;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="circle"></div>
        </div>
        <div><p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ipsam nemo architecto consequuntur ullam hic doloribus officiis debitis aperiam maxime nulla, amet dolorum dignissimos nihil quam vero aliquam, assumenda placeat rerum? lorem ipsum dolor sit amet</p></div>
    </div>
</body>
</html>
