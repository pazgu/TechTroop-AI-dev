<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container-evenly {
            display: flex;
            justify-content: space-evenly;
            width: 40%;
            height: 50px;
            border: 1px solid lightgray;
        }

        .container-evenly > div {
            height: 50px;
            width: 22%;
            background-color: rgb(136, 202, 222);
            justify-content: space-evenly;
            align-items: center;
        }

        .container-grow {
            display: flex;
            height: 50px;
            width: 40%;
            gap:4px;
            border: 1px solid lightgray;
        }

        .container-grow > div {
             height: 50px;
             background-color: rgb(136, 202, 222);
        }

        .container-grow > div:nth-child(1) {
            flex: 1;
        }

        .container-grow > div:nth-child(2),
        .container-grow > div:nth-child(3) {
            flex: 2;
        }
    </style>
</head>
<body>
    <h2> 4 boxes evenly distributed</h2>
    <div class="container-evenly">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>

    <h2> 2 boxes (2 and 3)are twice as big as the first</h2>
    <div class="container-grow">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html
