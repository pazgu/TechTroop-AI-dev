<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Layout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family:Segoe UI;
            background: linear-gradient(135deg, #6366f1, #a855f7); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-card {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            margin: 0 0 5px 0;
            color: #1e293b;
            font-size: 28px;
            font-weight: 700;
        }

        .form-header p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px; 
            flex: 1;  
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            color: #334155;
            background-color: #ffffff;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #6366f1;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical; 
        }

        .checkbox-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-section p {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #475569;
            font-weight: 500;
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            justify-content: space-between; 
            align-items: center;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-primary {
            background-color: #00d2ff;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="form-header">
            <h2>Contact Form</h2>
            <p>Get in touch with us</p>
        </div>
        <form class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" placeholder="">
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" placeholder="">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject">
                        <option value="">Select a topic</option>
                        <option value="general">General Inquiry</option>
                        <option value="support">Technical Support</option>
                        <option value="billing">Billing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Tell us how we can help..."></textarea>
            </div>

            <div class="checkbox-section">
                <p>Contact Preferences</p>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences" value="email"> Email Updates
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences" value="phone"> Phone Follow-up
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences" value="newsletter"> Newsletter
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary">Save Draft</button>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </div>

        </form>
    </div>

</body>
</html>
